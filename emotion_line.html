<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감정의 선 — 졸업전시 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+KR:wght@200;300;400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--world-bg1:#0a0408;--world-bg2:#0a0408;--accent:#fff;--transition-dur:1.8s}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0408;color:#fff;font-family:'Noto Sans KR',sans-serif;cursor:none;user-select:none}
#bg-layer{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 40%,var(--world-bg1) 0%,var(--world-bg2) 100%);transition:background var(--transition-dur) ease}
#bg-layer::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);pointer-events:none}
#particle-canvas{position:fixed;inset:0;z-index:1;pointer-events:none}
#draw-canvas{position:fixed;inset:0;z-index:10}
#cursor{position:fixed;z-index:9999;width:8px;height:8px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%);pointer-events:none;transition:background 1s,transform .1s,width .2s,height .2s;mix-blend-mode:difference}
#cursor-ring{position:fixed;z-index:9998;width:32px;height:32px;border-radius:50%;border:1px solid var(--accent);transform:translate(-50%,-50%);pointer-events:none;transition:width .3s,height .3s,border-color 1s,opacity .3s;opacity:.4}
#ui-overlay{position:fixed;inset:0;z-index:20;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:2rem 2.5rem}
.ui-top{display:flex;justify-content:space-between;align-items:flex-start}
.exhibition-title{font-family:'Cormorant Garamond',serif;font-size:clamp(.9rem,1.5vw,1.1rem);font-weight:300;letter-spacing:.15em;opacity:.6;line-height:1.6}
.exhibition-title em{display:block;font-style:italic;font-size:.75em;opacity:.6;letter-spacing:.2em;margin-top:2px}
.gesture-hints{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.hint{font-size:.6rem;letter-spacing:.15em;opacity:.35;transition:opacity .4s;font-weight:200;display:flex;align-items:center;gap:8px}
.hint svg{flex-shrink:0}
#world-message{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:25;text-align:center;pointer-events:none;opacity:0;transition:opacity .6s ease}
#world-message.visible{opacity:1}
#world-message .msg-main{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,4.5rem);font-weight:300;font-style:italic;line-height:1.2;letter-spacing:-.01em;color:#fff;text-shadow:0 0 60px currentColor}
#world-message .msg-sub{font-size:clamp(.65rem,1.2vw,.8rem);font-weight:200;letter-spacing:.3em;opacity:.5;margin-top:1rem;text-transform:uppercase}
#detect-feedback{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);z-index:30;font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;font-weight:200;opacity:0;transition:opacity .4s;text-align:center;pointer-events:none}
#detect-feedback.show{opacity:.7}
#guide{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0408;transition:opacity 1.2s ease}
#guide.fade-out{opacity:0;pointer-events:none}
.guide-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,7vw,5.5rem);font-weight:300;letter-spacing:-.02em;text-align:center;line-height:1.1;margin-bottom:1.5rem}
.guide-title span{display:block;font-style:italic;opacity:.5;font-size:.55em;letter-spacing:.1em}
.guide-desc{font-size:clamp(.75rem,1.5vw,.9rem);font-weight:200;color:rgba(255,255,255,.5);text-align:center;line-height:2;letter-spacing:.05em;max-width:420px;margin-bottom:3rem}
.gesture-preview{display:flex;gap:2rem;margin-bottom:3rem;flex-wrap:wrap;justify-content:center}
.gp-item{display:flex;flex-direction:column;align-items:center;gap:10px}
.gp-shape{width:48px;height:48px;display:flex;align-items:center;justify-content:center;opacity:.7}
.gp-label{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;opacity:.35;font-weight:300}
.gp-world{font-size:.6rem;font-weight:200;opacity:.5;letter-spacing:.1em}
.start-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);font-family:'Noto Sans KR',sans-serif;font-size:.65rem;font-weight:200;letter-spacing:.3em;padding:1rem 2.5rem;cursor:none;transition:border-color .3s,color .3s,background .3s}
.start-btn:hover{border-color:rgba(255,255,255,.8);color:#fff;background:rgba(255,255,255,.05)}
#world-indicator{position:fixed;bottom:2rem;right:2.5rem;z-index:20;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;opacity:.25;font-weight:200;pointer-events:none;transition:opacity .5s;text-align:right}
#clear-btn{position:fixed;bottom:2rem;left:2.5rem;z-index:20;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;opacity:.2;font-weight:200;cursor:none;background:none;border:none;color:#fff;transition:opacity .3s;pointer-events:all}
#clear-btn:hover{opacity:.6}
#transition-flash{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;transition:opacity .15s}
#transition-flash.flash{opacity:.15}
#audio-notice{position:fixed;top:2rem;left:50%;transform:translateX(-50%);z-index:60;font-size:.6rem;letter-spacing:.15em;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);padding:.6rem 1.5rem;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;font-weight:200}
#audio-notice.show{opacity:1}
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<canvas id="draw-canvas"></canvas>

<div id="guide">
  <p style="font-size:.55rem;letter-spacing:.35em;opacity:.3;text-transform:uppercase;margin-bottom:2rem">2026 졸업전시</p>
  <h1 class="guide-title">감정의 선<span>Draw Your Emotion</span></h1>
  <p class="guide-desc">마우스로 도형을 그리세요.<br>당신의 선이 감정이 되고, 감정이 세계가 됩니다.</p>
  <div class="gesture-preview">
    <div class="gp-item"><div class="gp-shape"><svg width="36" height="36" viewBox="0 0 36 36"><circle cx="18" cy="18" r="12" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/></svg></div><div class="gp-label">Circle</div><div class="gp-world">평온</div></div>
    <div class="gp-item"><div class="gp-shape"><svg width="36" height="36" viewBox="0 0 36 36"><path d="M18 30C18 30 4 20 4 13C4 8 8 4 13 4C15.5 4 18 6.5 18 9C18 6.5 20.5 4 23 4C28 4 32 8 32 13C32 20 18 30 18 30Z" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/></svg></div><div class="gp-label">Heart</div><div class="gp-world">사랑</div></div>
    <div class="gp-item"><div class="gp-shape"><svg width="36" height="36" viewBox="0 0 36 36"><polygon points="18,6 4,30 32,30" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5"/></svg></div><div class="gp-label">Triangle</div><div class="gp-world">우울</div></div>
    <div class="gp-item"><div class="gp-shape"><svg width="36" height="36" viewBox="0 0 36 36"><line x1="18" y1="30" x2="18" y2="6" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/><polyline points="10,14 18,6 26,14" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="gp-label">Swipe Up</div><div class="gp-world">기쁨</div></div>
    <div class="gp-item"><div class="gp-shape"><svg width="36" height="36" viewBox="0 0 36 36"><line x1="8" y1="8" x2="28" y2="28" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/><line x1="28" y1="8" x2="8" y2="28" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="gp-label">Cross</div><div class="gp-world">분노</div></div>
  </div>

</div>

<div id="ui-overlay"><div class="ui-top">
  <div class="exhibition-title">감정의 선<em>Draw Your Emotion — 2026 Graduation Exhibition</em></div>
  <div class="gesture-hints">
    <div class="hint"><svg width="14" height="14" viewBox="0 0 36 36"><circle cx="18" cy="18" r="12" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2"/></svg>원 → 평온의 세계</div>
    <div class="hint"><svg width="14" height="14" viewBox="0 0 36 36"><path d="M18 30C18 30 4 20 4 13C4 8 8 4 13 4C15.5 4 18 6.5 18 9C18 6.5 20.5 4 23 4C28 4 32 8 32 13C32 20 18 30 18 30Z" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2"/></svg>하트 → 사랑의 세계</div>
    <div class="hint"><svg width="14" height="14" viewBox="0 0 36 36"><polygon points="18,6 4,30 32,30" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2"/></svg>삼각형 → 우울의 세계</div>
    <div class="hint"><svg width="14" height="14" viewBox="0 0 36 36"><line x1="18" y1="30" x2="18" y2="6" stroke="rgba(255,255,255,.5)" stroke-width="2"/><polyline points="10,14 18,6 26,14" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2" stroke-linejoin="round"/></svg>위로 쓸기 → 기쁨의 세계</div>
    <div class="hint"><svg width="14" height="14" viewBox="0 0 36 36"><line x1="8" y1="8" x2="28" y2="28" stroke="rgba(255,255,255,.5)" stroke-width="2"/><line x1="28" y1="8" x2="8" y2="28" stroke="rgba(255,255,255,.5)" stroke-width="2"/></svg>X자 → 분노의 세계</div>
  </div>
</div></div>

<div id="world-message"><div class="msg-main" id="msg-main-text"></div><div class="msg-sub" id="msg-sub-text"></div></div>
<div id="detect-feedback"></div>
<div id="world-indicator"></div>
<div id="audio-notice">클릭하여 사운드를 활성화하세요</div>
<button id="clear-btn">[ 캔버스 지우기 ]</button>

<script>
const NOTE_FREQ={};
(function(){const n=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];for(let o=1;o<=7;o++)for(let i=0;i<12;i++){const m=(o+1)*12+i;NOTE_FREQ[n[i]+o]=440*Math.pow(2,(m-69)/12)}})();

const WORLDS={
  default:{name:'',bg1:'#0a0408',bg2:'#0a0408',lineColor:'rgba(255,255,255,0.6)',particleColor:[255,255,255],message:'',sub:'',flashColor:'#ffffff',freq:220,waveform:'sine'},
  circle:{name:'평온의 세계',bg1:'#040d1a',bg2:'#061525',lineColor:'rgba(100,180,255,0.8)',particleColor:[100,200,255],message:'지금 이 순간',sub:'Be Here Now',flashColor:'#60b0ff',freq:174,waveform:'sine',glowColor:'rgba(80,160,255,0.12)',
    melody:[{n:'Db4',d:.6},{n:'F4',d:.6},{n:'Ab4',d:.8},{n:'Bb4',d:.4},{n:'Ab4',d:.5},{n:'F4',d:.8},{n:'Db4',d:.6},{n:'Eb4',d:.5},{n:'F4',d:1.0}],melodyTempo:.9},
  heart:{name:'사랑의 세계',bg1:'#1a0510',bg2:'#2d0820',lineColor:'rgba(255,120,160,0.85)',particleColor:[255,140,170],message:'사랑하는 모든 것에게',sub:'For Everything You Love',flashColor:'#ff6090',freq:528,waveform:'sine',glowColor:'rgba(255,100,150,0.15)',
    melody:[{n:'E4',d:.5},{n:'F4',d:.3},{n:'G4',d:.5},{n:'C5',d:.8},{n:'B4',d:.4},{n:'A4',d:.5},{n:'G4',d:.6},{n:'F4',d:.3},{n:'E4',d:.5},{n:'D4',d:.9}],melodyTempo:.85},
  triangle:{name:'우울의 세계',bg1:'#080810',bg2:'#0a0a18',lineColor:'rgba(130,140,180,0.8)',particleColor:[130,140,180],message:'괜찮지 않아도 괜찮아',sub:"It's Okay Not to Be Okay",flashColor:'#7080b0',freq:146,waveform:'sine',glowColor:'rgba(100,110,160,0.12)',
    melody:[{n:'Bb3',d:.9},{n:'C4',d:.7},{n:'D4',d:1.0},{n:'Eb4',d:.8},{n:'D4',d:.6},{n:'C4',d:.9},{n:'Bb3',d:.7},{n:'A3',d:1.2}],melodyTempo:1.1},
  swipe:{name:'기쁨의 세계',bg1:'#0a1008',bg2:'#142010',lineColor:'rgba(255,230,80,0.9)',particleColor:[255,240,100],message:'환희의 빛',sub:'Let There Be Light',flashColor:'#ffe040',freq:660,waveform:'sine',glowColor:'rgba(255,220,50,0.18)',
    melody:[{n:'E4',d:.35},{n:'E4',d:.35},{n:'F4',d:.35},{n:'G4',d:.35},{n:'G4',d:.35},{n:'F4',d:.35},{n:'E4',d:.35},{n:'D4',d:.35},{n:'C4',d:.35},{n:'C4',d:.35},{n:'D4',d:.35},{n:'E4',d:.35},{n:'E4',d:.5},{n:'D4',d:.2},{n:'D4',d:.6}],melodyTempo:.6},
  cross:{name:'분노의 세계',bg1:'#1a0808',bg2:'#280a0a',lineColor:'rgba(255,80,60,0.9)',particleColor:[255,90,60],message:'타오르는 감정',sub:'Burn Through the Pain',flashColor:'#ff4030',freq:330,waveform:'sawtooth',glowColor:'rgba(255,60,40,0.18)',
    melody:[{n:'A3',d:.22},{n:'B3',d:.22},{n:'C4',d:.22},{n:'D4',d:.22},{n:'E4',d:.22},{n:'C4',d:.22},{n:'E4',d:.35},{n:'Eb4',d:.22},{n:'C4',d:.22},{n:'Eb4',d:.35},{n:'E4',d:.22},{n:'C4',d:.22},{n:'E4',d:.22},{n:'F4',d:.22},{n:'G4',d:.4}],melodyTempo:.5},
};

let currentWorld='default',isDrawing=false,drawPoints=[],allStrokes=[],recentStrokes=[],particles=[],msgTimer=null,audioCtx=null,audioUnlocked=false,animFrame=null,melodyNodes=[];

const drawCanvas=document.getElementById('draw-canvas'),drawCtx=drawCanvas.getContext('2d'),pCanvas=document.getElementById('particle-canvas'),pCtx=pCanvas.getContext('2d');
function resize(){drawCanvas.width=pCanvas.width=window.innerWidth;drawCanvas.height=pCanvas.height=window.innerHeight;redrawAllStrokes()}
resize();window.addEventListener('resize',resize);

const cursorEl=document.getElementById('cursor'),cursorRing=document.getElementById('cursor-ring');
let mx=0,my=0,ringX=0,ringY=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
function animateCursor(){cursorEl.style.left=mx+'px';cursorEl.style.top=my+'px';ringX+=(mx-ringX)*.12;ringY+=(my-ringY)*.12;cursorRing.style.left=ringX+'px';cursorRing.style.top=ringY+'px';requestAnimationFrame(animateCursor)}
animateCursor();

function unlockAudio(){if(audioUnlocked)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioUnlocked=true;document.getElementById('audio-notice').classList.remove('show')}

function playTransitionSfx(key){
  if(!audioUnlocked||!audioCtx)return;const w=WORLDS[key];if(!w.freq)return;
  try{const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
  o.type=w.waveform||'sine';o.frequency.setValueAtTime(w.freq,t);o.frequency.exponentialRampToValueAtTime(w.freq*1.5,t+.3);
  f.type='lowpass';f.frequency.value=2000;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.12,t+.1);g.gain.exponentialRampToValueAtTime(.001,t+1.5);
  o.connect(f);f.connect(g);g.connect(audioCtx.destination);o.start();o.stop(t+1.6);
  const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.type='sine';o2.frequency.value=w.freq*2;
  g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.05,t+.2);g2.gain.exponentialRampToValueAtTime(.001,t+1.2);
  o2.connect(g2);g2.connect(audioCtx.destination);o2.start();o2.stop(t+1.3)}catch(e){}
}

function stopMelody(){for(const n of melodyNodes){try{n.stop()}catch(e){}}melodyNodes=[]}

function playMelody(key){
  if(!audioUnlocked||!audioCtx)return;const w=WORLDS[key];if(!w.melody)return;stopMelody();
  const tempo=w.melodyTempo||.8;let time=audioCtx.currentTime+.6;
  const master=audioCtx.createGain();master.gain.setValueAtTime(.09,audioCtx.currentTime);master.connect(audioCtx.destination);
  const dl=audioCtx.createDelay(.5);dl.delayTime.value=.12;const dg=audioCtx.createGain();dg.gain.value=.25;dl.connect(dg);dg.connect(master);
  for(const note of w.melody){
    const freq=NOTE_FREQ[note.n];if(!freq)continue;const dur=note.d*tempo;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,time);g.gain.linearRampToValueAtTime(1,time+.03);g.gain.setValueAtTime(1,time+dur*.65);g.gain.exponentialRampToValueAtTime(.001,time+dur);
    o.connect(g);g.connect(master);g.connect(dl);o.start(time);o.stop(time+dur+.1);melodyNodes.push(o);
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.type='sine';o2.frequency.value=freq*2;
    g2.gain.setValueAtTime(0,time);g2.gain.linearRampToValueAtTime(.12,time+.04);g2.gain.exponentialRampToValueAtTime(.001,time+dur*.7);
    o2.connect(g2);g2.connect(master);o2.start(time);o2.stop(time+dur+.1);melodyNodes.push(o2);
    time+=dur}
  const td=time-audioCtx.currentTime;
  master.gain.setValueAtTime(.09,audioCtx.currentTime+Math.max(0,td-.3));
  master.gain.linearRampToValueAtTime(0,audioCtx.currentTime+td+.8);
}

function playDrawSound(){
  if(!audioUnlocked||!audioCtx)return;const w=WORLDS[currentWorld];
  try{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=(w.freq||220)+Math.random()*80;
  g.gain.setValueAtTime(.02,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.08);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.1)}catch(e){}
}

function enterWorld(key){
  if(key===currentWorld&&key!=='default')return;currentWorld=key;const w=WORLDS[key];
  document.getElementById('bg-layer').style.background=`radial-gradient(ellipse at 30% 40%,${w.bg1} 0%,${w.bg2} 100%)`;
  const fl=document.getElementById('transition-flash');fl.style.background=w.flashColor||'#fff';fl.classList.add('flash');setTimeout(()=>fl.classList.remove('flash'),200);
  if(w.message){const wm=document.getElementById('world-message');document.getElementById('msg-main-text').textContent=w.message;document.getElementById('msg-sub-text').textContent=w.sub;wm.classList.add('visible');if(msgTimer)clearTimeout(msgTimer);msgTimer=setTimeout(()=>wm.classList.remove('visible'),3500)}
  const ind=document.getElementById('world-indicator');ind.textContent=w.name;ind.style.opacity=w.name?'0.35':'0';
  spawnBurst(w.particleColor,60);playTransitionSfx(key);if(key!=='default')playMelody(key);
  const fb=document.getElementById('detect-feedback');if(w.name){fb.textContent=`${w.name} 감지됨`;fb.classList.add('show');setTimeout(()=>fb.classList.remove('show'),2500)}
}

function recognizeGesture(pts){
  if(pts.length<10)return null;
  const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const w=maxX-minX,h=maxY-minY,cx=(minX+maxX)/2,cy=(minY+maxY)/2;
  const first=pts[0],last=pts[pts.length-1];
  const closeDist=Math.hypot(last.x-first.x,last.y-first.y);
  const totalLen=pts.reduce((a,p,i)=>i===0?0:a+Math.hypot(p.x-pts[i-1].x,p.y-pts[i-1].y),0);
  const isClosed=closeDist<Math.max(w,h)*.35&&totalLen>60;
  const straightness=totalLen>0?Math.hypot(last.x-first.x,last.y-first.y)/totalLen:0;

  // 1. 위로쓸기
  if(pts.length>6&&!isClosed){const dy=first.y-last.y;if(dy>80&&h>w*2&&straightness>.7&&h>100)return'swipe'}

  // 2. 원
  if(isClosed&&pts.length>20){
    const avgR=pts.reduce((a,p)=>a+Math.hypot(p.x-cx,p.y-cy),0)/pts.length;
    const variance=pts.reduce((a,p)=>a+Math.pow(Math.hypot(p.x-cx,p.y-cy)-avgR,2),0)/pts.length;
    const circularity=1-(Math.sqrt(variance)/avgR);const aspect=Math.min(w,h)/Math.max(w,h);
    if(circularity>.72&&aspect>.55)return'circle'}

  // 3. 하트
  if(isClosed&&pts.length>25){
    const midY=cy;const topPts=pts.filter(p=>p.y<midY);const botPts=pts.filter(p=>p.y>=midY);
    if(topPts.length>8&&botPts.length>8){
      const topW=Math.max(...topPts.map(p=>p.x))-Math.min(...topPts.map(p=>p.x));
      const botMinY=Math.max(...botPts.map(p=>p.y));const botMinPt=botPts.find(p=>p.y===botMinY);
      const botCenterX=botMinPt?botMinPt.x:cx;const botOffset=Math.abs(botCenterX-cx)/w;const heightRatio=h/w;
      if(topW/w>.55&&botOffset<.35&&heightRatio>.6&&heightRatio<1.6)return'heart'}}

  // 4. 삼각형
  if(isClosed&&pts.length>15&&w>40&&h>40){
    const avgR=pts.reduce((a,p)=>a+Math.hypot(p.x-cx,p.y-cy),0)/pts.length;
    const variance=pts.reduce((a,p)=>a+Math.pow(Math.hypot(p.x-cx,p.y-cy)-avgR,2),0)/pts.length;
    const circularity=1-(Math.sqrt(variance)/avgR);
    if(circularity<.82){
      let corners=[];const step=Math.max(3,Math.floor(pts.length/20));
      for(let i=step;i<pts.length-step;i++){
        const dx1=pts[i].x-pts[i-step].x,dy1=pts[i].y-pts[i-step].y,dx2=pts[i+step].x-pts[i].x,dy2=pts[i+step].y-pts[i].y;
        const len1=Math.hypot(dx1,dy1),len2=Math.hypot(dx2,dy2);if(len1<2||len2<2)continue;
        const dot=(dx1*dx2+dy1*dy2)/(len1*len2);const angle=Math.acos(Math.max(-1,Math.min(1,dot)));
        if(angle>.5){if(corners.length===0||Math.hypot(pts[i].x-pts[corners[corners.length-1]].x,pts[i].y-pts[corners[corners.length-1]].y)>Math.max(w,h)*.15)corners.push(i)}}
      if(corners.length>=2&&corners.length<=5){const aspect=Math.min(w,h)/Math.max(w,h);if(aspect>.35)return'triangle'}}}

  // 5. 대각선 (X자 절반)
  if(!isClosed&&straightness>.65&&w>50&&h>50){const diag=Math.min(w,h)/Math.max(w,h);if(diag>.3)return'_diagonal'}
  return null}

function checkCrossFromRecent(){
  if(recentStrokes.length<2)return false;
  const s1=recentStrokes[recentStrokes.length-2],s2=recentStrokes[recentStrokes.length-1];
  if(s1.gesture!=='_diagonal'||s2.gesture!=='_diagonal')return false;
  if(s2.time-s1.time>2000)return false;
  const a0=s1.points[0],a1=s1.points[s1.points.length-1],b0=s2.points[0],b1=s2.points[s2.points.length-1];
  const ccw=(A,B,C)=>(C.y-A.y)*(B.x-A.x)>(B.y-A.y)*(C.x-A.x);
  const inter=ccw(a0,b0,b1)!==ccw(a1,b0,b1)&&ccw(a0,a1,b0)!==ccw(a0,a1,b1);
  if(!inter)return false;
  const dx1=a1.x-a0.x,dy1=a1.y-a0.y,dx2=b1.x-b0.x,dy2=b1.y-b0.y;
  const l1=Math.hypot(dx1,dy1),l2=Math.hypot(dx2,dy2);if(l1<1||l2<1)return false;
  return(dx1*dx2+dy1*dy2)/(l1*l2)<.3}

let soundThrottle=0;
function startDraw(x,y){unlockAudio();isDrawing=true;drawPoints=[{x,y}];cursorEl.style.width='10px';cursorEl.style.height='10px'}
function moveDraw(x,y){
  if(!isDrawing)return;drawPoints.push({x,y});
  const w=WORLDS[currentWorld],ctx=drawCtx;
  if(drawPoints.length>1){const p0=drawPoints[drawPoints.length-2],p1=drawPoints[drawPoints.length-1];
  ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.strokeStyle=w.lineColor;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  if(w.glowColor){ctx.shadowColor=w.lineColor;ctx.shadowBlur=12}else{ctx.shadowBlur=6;ctx.shadowColor=w.lineColor}
  ctx.stroke();ctx.shadowBlur=0}
  if(Math.random()<.25)spawnParticle(x,y,WORLDS[currentWorld].particleColor);
  if(Date.now()-soundThrottle>120){playDrawSound();soundThrottle=Date.now()}}

function endDraw(){
  if(!isDrawing)return;isDrawing=false;cursorEl.style.width='8px';cursorEl.style.height='8px';
  if(drawPoints.length<6){drawPoints=[];return}
  const gesture=recognizeGesture(drawPoints);
  allStrokes.push({points:[...drawPoints],worldKey:currentWorld,color:WORLDS[currentWorld].lineColor,gesture});
  recentStrokes.push({points:[...drawPoints],gesture,time:Date.now()});
  if(recentStrokes.length>5)recentStrokes.shift();
  if(gesture==='_diagonal'&&checkCrossFromRecent())enterWorld('cross');
  else if(gesture&&gesture!=='_diagonal')enterWorld(gesture);
  drawPoints=[]}

drawCanvas.addEventListener('mousedown',e=>startDraw(e.clientX,e.clientY));
drawCanvas.addEventListener('mousemove',e=>moveDraw(e.clientX,e.clientY));
drawCanvas.addEventListener('mouseup',endDraw);
drawCanvas.addEventListener('mouseleave',endDraw);
drawCanvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];startDraw(t.clientX,t.clientY)},{passive:false});
drawCanvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];moveDraw(t.clientX,t.clientY)},{passive:false});
drawCanvas.addEventListener('touchend',e=>{e.preventDefault();endDraw()},{passive:false});

function spawnParticle(x,y,color,opts={}){
  const speed=opts.speed||(.3+Math.random()*1.2),angle=opts.angle!==undefined?opts.angle:Math.random()*Math.PI*2;
  particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-.5,alpha:opts.alpha||(.5+Math.random()*.4),size:opts.size||(1+Math.random()*2.5),color,decay:opts.decay||(.008+Math.random()*.01),gravity:opts.gravity!==undefined?opts.gravity:.02,twinkle:Math.random()>.5})}
function spawnBurst(color,count){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<count;i++){const angle=(i/count)*Math.PI*2;spawnParticle(cx+(Math.random()-.5)*200,cy+(Math.random()-.5)*200,color,{speed:1+Math.random()*3,angle,alpha:.7,size:1.5+Math.random()*3,decay:.006})}}
function updateParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);particles=particles.filter(p=>p.alpha>.01);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.99;p.alpha-=p.decay;
  const a=Math.max(0,p.alpha)*(p.twinkle?(.7+.3*Math.sin(Date.now()*.01+p.x)):1);
  pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);pCtx.fillStyle=`rgba(${p.color[0]},${p.color[1]},${p.color[2]},${a})`;pCtx.fill()}}
function redrawAllStrokes(){
  drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  for(const s of allStrokes){if(s.points.length<2)continue;drawCtx.beginPath();drawCtx.moveTo(s.points[0].x,s.points[0].y);
  for(let i=1;i<s.points.length;i++)drawCtx.lineTo(s.points[i].x,s.points[i].y);
  drawCtx.strokeStyle=s.color.replace(/[\d.]+\)$/,'0.4)');drawCtx.lineWidth=1.5;drawCtx.lineCap='round';drawCtx.lineJoin='round';drawCtx.shadowColor=s.color;drawCtx.shadowBlur=4;drawCtx.stroke();drawCtx.shadowBlur=0}}

document.getElementById('clear-btn').addEventListener('click',()=>{allStrokes=[];recentStrokes=[];drawCtx.clearRect(0,0,drawCanvas.width,drawCanvas.height);stopMelody();enterWorld('default')});
document.getElementById('start-btn').addEventListener('click',()=>{unlockAudio();const g=document.getElementById('guide');g.classList.add('fade-out');setTimeout(()=>{g.style.display='none'},1200);if(!audioUnlocked){const n=document.getElementById('audio-notice');n.classList.add('show');setTimeout(()=>n.classList.remove('show'),3000)}});

function loop(){updateParticles();animFrame=requestAnimationFrame(loop)}
loop();
</script>
